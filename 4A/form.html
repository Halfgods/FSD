<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        form{
            background-color:aqua
        }
    </style>
</head>
<body>
    <h2>Student Form</h2>
    <form action="/submit" method="POST">
        <label>Student Name:</label><br>
        <input type="text" name="name" required placeholder="Enter your name"><br><br>
        <label>Branch:</label><br>
        <input type="text" name="branch" required placeholder="Enter your branch"><br><br>
        <label>Year:</label><br>
        <input type="text" name="year" required placeholder="Enter your year"><br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
</body>
</html>
